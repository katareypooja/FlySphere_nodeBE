<mat-toolbar class="custom-toolbar">
  <div class="logo-container">
    <!-- Custom SVG Aircraft Icon -->
    <svg class="logo-icon" viewBox="0 0 24 24">
      <path fill="currentColor"
        d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2
           1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1
           3.5 1v-1.5L13 19v-5.5L21 16z"/>
    </svg>
    <div class="logo-text-group">
      <span class="logo-text">FlySphere</span>
      <span class="logo-tagline">Your Journey Begins Here</span>
    </div>
  </div>

  <span style="flex: 1 1 auto;"></span>

  <button 
    mat-button 
routerLink="/admin/dashboard"
    routerLinkActive="active-link"
    [routerLinkActiveOptions]="{ exact: true }">
    Dashboard
  </button>

  <button 
    mat-button 
    routerLink="/admin/create-flight" 
    routerLinkActive="active-link">
    Create Flight
  </button>

  <button 
    mat-button 
    routerLink="/admin/flights" 
    routerLinkActive="active-link">
    Flights
  </button>

  <!-- Profile Icon -->
  <button mat-icon-button [matMenuTriggerFor]="profileMenu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #profileMenu="matMenu">
    <div style="padding:12px 16px; min-width:220px;">
      <div style="font-weight:600;">{{ adminName }}</div>
      <div style="font-size:13px; color:gray;">{{ adminEmail }}</div>
    </div>

    <mat-divider></mat-divider>

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>

</mat-toolbar>
